services:
  db:
    image: postgres:15
    container_name: sn_postgres
    restart: always
    environment:
      POSTGRES_USER: kareem
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: smart_note
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: sn_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./:/app

volumes:
  postgres_data:
